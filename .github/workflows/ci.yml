name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Guard against UNKNOWN-0.0.0 sdist regression
        run: |
          set -e
          rm -rf _install_test
          mkdir _install_test
          python -m pip install --target _install_test dist/claude_session_budget-*.tar.gz
          if [ ! -d _install_test/claude_session_budget ]; then
            echo "sdist install failed â€” claude_session_budget package missing (likely UNKNOWN-0.0.0 regression)"
            ls _install_test
            exit 1
          fi
          PYTHONPATH=_install_test python -c "import claude_session_budget as p; assert p.__version__ and p.__version__ != '0.0.0', p.__version__; print('sdist install OK:', p.__version__)"

      - name: Install wheel and verify console scripts
        run: |
          set -e
          python -m pip install dist/claude_session_budget-*.whl
          python -c "from claude_session_budget import budget_check, calibrate; print('imports OK')"
          command -v budget-check
          command -v budget-calibrate

      - name: Verify version alignment across files
        run: |
          set -e
          PY_VERSION=$(python -c "import claude_session_budget; print(claude_session_budget.__version__)")
          PYPROJECT_VERSION=$(python -c "import re,sys; m=re.search(r'^version = \"([^\"]+)\"', open('pyproject.toml').read(), re.M); print(m.group(1))")
          SETUPCFG_VERSION=$(python -c "import re; m=re.search(r'^version = (.+)$', open('setup.cfg').read(), re.M); print(m.group(1).strip())")
          PLUGIN_VERSION=$(python -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          MARKETPLACE_VERSION=$(python -c "import json; print(json.load(open('.claude-plugin/marketplace.json'))['plugins'][0]['version'])")
          FORMULA_VERSION=$(python -c "import re; m=re.search(r'archive/refs/tags/v([0-9.]+)\.tar\.gz', open('Formula/claude-session-budget.rb').read()); print(m.group(1))")
          INSTALL_VERSION=$(python -c "import re; m=re.search(r'^TAG=\"v([0-9.]+)\"', open('install.sh').read(), re.M); print(m.group(1))")
          echo "package=$PY_VERSION"
          echo "pyproject=$PYPROJECT_VERSION"
          echo "setup.cfg=$SETUPCFG_VERSION"
          echo "plugin.json=$PLUGIN_VERSION"
          echo "marketplace.json=$MARKETPLACE_VERSION"
          echo "Formula=$FORMULA_VERSION"
          echo "install.sh=$INSTALL_VERSION"
          for v in "$PYPROJECT_VERSION" "$SETUPCFG_VERSION" "$PLUGIN_VERSION" "$MARKETPLACE_VERSION" "$FORMULA_VERSION" "$INSTALL_VERSION"; do
            if [ "$v" != "$PY_VERSION" ]; then
              echo "version mismatch: package=$PY_VERSION but file has $v"
              exit 1
            fi
          done
          echo "all versions aligned at $PY_VERSION"
